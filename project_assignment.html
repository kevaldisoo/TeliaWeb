<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Assignment Form</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f2f2f2;
      color: #2c3e50;
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    .card {
      max-width: 560px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 2.5rem;
    }

    h2 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.35rem; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 1.8rem; }

    /* ── Notification banner ── */
    .notification {
      padding: 0.7rem 1rem;
      border-radius: 6px;
      margin-bottom: 1.25rem;
      font-size: 0.875rem;
      display: none;
    }
    .notification.success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; display: flex; }
    .notification.error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; display: flex; }

    /* ── Field layout ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 1.15rem;
    }

    .field > label,
    .field > fieldset > legend {
      font-size: 0.875rem;
      font-weight: 500;
      color: #2c3e50;
    }

    .field > label .hint,
    .field > label .optional {
      font-size: 0.75rem;
      color: #888;
      font-weight: normal;
      font-style: italic;
    }

    /* ── Inputs ── */
    input[type="text"],
    input[type="email"],
    select {
      padding: 0.52rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      width: 100%;
      background: #fff;
      color: #2c3e50;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    select:focus {
      outline: none;
      border-color: #00b37e;
    }

    /* Invalid state applied by JS */
    input.invalid, select.invalid { border-color: #dc2626; }

    select[multiple] { height: 210px; padding: 0.25rem; }
    select[multiple] option { padding: 0.35rem 0.5rem; border-radius: 4px; }

    /* ── Radio group ── */
    fieldset { border: none; padding: 0; }

    .radio-group { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.2rem; }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      font-weight: normal;
      cursor: pointer;
    }

    /* ── Checkbox ── */
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      cursor: pointer;
    }

    /* ── Inline error messages ── */
    .error-msg {
      font-size: 0.8rem;
      color: #dc2626;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── Buttons ── */
    .actions { display: flex; gap: 0.75rem; margin-top: 1.75rem; }

    button {
      padding: 0.6rem 1.4rem;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.2s;
    }

    .btn-primary { background: #00b37e; color: #fff; }
    .btn-primary:hover { background: #009968; }

    .btn-secondary { background: transparent; color: #2c3e50; border-color: #ccc; }
    .btn-secondary:hover { background: #f2f2f2; }
  </style>
</head>
<body>

<div class="card">
  <h2>Project Assignment Form</h2>
  <p class="subtitle">Complete your profile to get assigned to internal projects.</p>

  <div id="form-notification" class="notification" role="alert"></div>

  <!--
    NOTE: In the full Vue + FastAPI application, the "Available Projects" multi-select
    is populated dynamically from the database via GET /api/projects/.
    The options below are static placeholders for standalone HTML reference only.
  -->
  <form id="assignment-form" novalidate>

    <!-- Full Name -->
    <div class="field">
      <label for="full_name">Full Name</label>
      <input
        type="text"
        id="full_name"
        name="full_name"
        autocomplete="name"
        placeholder="Jane Doe"
        required
      />
      <span class="error-msg" id="err-full_name" role="alert"></span>
    </div>

    <!-- Email Address -->
    <div class="field">
      <label for="email">Email Address</label>
      <!-- FIX: was type="text" — must be type="email" for format validation -->
      <input
        type="email"
        id="email"
        name="email"
        autocomplete="email"
        placeholder="jane@company.com"
        required
      />
      <span class="error-msg" id="err-email" role="alert"></span>
    </div>

    <!-- Experience Level -->
    <div class="field">
      <label for="experience_level">Experience Level</label>
      <select id="experience_level" name="experience_level" required>
        <option value="">Select your level</option>
        <option value="junior">Junior (0–2 years)</option>
        <option value="mid">Mid-level (2–5 years)</option>
        <option value="senior">Senior (5+ years)</option>
      </select>
      <span class="error-msg" id="err-experience_level" role="alert"></span>
    </div>

    <!-- Tech Stack -->
    <div class="field">
      <label for="tech_stack">Primary Technology Stack</label>
      <select id="tech_stack" name="tech_stack" required>
        <option value="">Choose one</option>
        <option value="backend">Backend Development</option>
        <option value="frontend">Frontend Development</option>
        <option value="fullstack">Full-Stack Development</option>
        <option value="data">Data Engineering</option>
        <option value="devops">DevOps</option>
        <option value="mobile">Mobile Development</option>
      </select>
      <span class="error-msg" id="err-tech_stack" role="alert"></span>
    </div>

    <!-- Available Projects -->
    <div class="field">
      <label for="projects">
        Available Projects
        <span class="hint">— Hold Ctrl / ⌘ to select multiple</span>
      </label>
      <!-- FIX: options are hardcoded here; the Vue app populates these from the API -->
      <select id="projects" name="project_ids" multiple required>
        <option value="1">Customer Portal Redesign</option>
        <option value="2">Data Pipeline Migration</option>
        <option value="3">Mobile App Enhancement</option>
        <option value="4">Internal Analytics Dashboard</option>
        <option value="5">API Gateway Implementation</option>
        <option value="6">Cloud Infrastructure Setup</option>
        <option value="7">E-commerce Platform Update</option>
        <option value="8">Reporting System Automation</option>
        <option value="9">Microservices Architecture Transition</option>
        <option value="10">Customer Data Platform Integration</option>
      </select>
      <span class="error-msg" id="err-projects" role="alert"></span>
    </div>

    <!-- Preferred Project Duration -->
    <!-- FIX: was three ungrouped <input type="radio"> with no name attribute;
         wrapped in <fieldset> + <legend> and given name="preferred_duration" -->
    <div class="field">
      <fieldset>
        <legend>Preferred Project Duration</legend>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="preferred_duration" value="short" required />
            Short-term (1–3 months)
          </label>
          <label class="radio-label">
            <input type="radio" name="preferred_duration" value="medium" />
            Medium-term (3–6 months)
          </label>
          <label class="radio-label">
            <input type="radio" name="preferred_duration" value="long" />
            Long-term (6+ months)
          </label>
        </div>
      </fieldset>
      <span class="error-msg" id="err-preferred_duration" role="alert"></span>
    </div>

    <!-- Additional Skills (optional) -->
    <div class="field">
      <label for="additional_skills">
        Additional Skills <span class="optional">(optional)</span>
      </label>
      <input
        type="text"
        id="additional_skills"
        name="additional_skills"
        placeholder="e.g. Python, Docker, React"
      />
    </div>

    <!-- Availability Confirmation -->
    <!-- FIX: was a bare <input type="checkbox"> with no id, name, or <label> -->
    <div class="field">
      <label class="checkbox-label">
        <input type="checkbox" id="availability_confirmed" name="availability_confirmed" />
        I confirm my availability for the selected projects
      </label>
      <span class="error-msg" id="err-availability_confirmed" role="alert"></span>
    </div>

    <!-- Actions -->
    <!-- FIX: was <input type="button"> — replaced with semantic <button> elements -->
    <div class="actions">
      <button type="submit" class="btn-primary">Save Profile</button>
      <button type="button" class="btn-secondary" onclick="clearForm()">Clear Form</button>
    </div>

  </form>
</div>

<script>
  const form       = document.getElementById('assignment-form')
  const banner     = document.getElementById('form-notification')
  const EMAIL_RE   = /^[^\s@]+@[^\s@]+\.[^\s@]+$/

  // ── Helpers ──────────────────────────────────────────────────────────────

  function showFieldError(fieldId, message) {
    const msg = document.getElementById('err-' + fieldId)
    if (!msg) return
    msg.textContent = message
    msg.classList.add('visible')

    const control = document.getElementById(fieldId)
      ?? document.querySelector(`[name="${fieldId}"]`)
    control?.classList.add('invalid')
  }

  function clearFieldError(fieldId) {
    const msg = document.getElementById('err-' + fieldId)
    msg?.classList.remove('visible')

    const control = document.getElementById(fieldId)
      ?? document.querySelector(`[name="${fieldId}"]`)
    control?.classList.remove('invalid')
  }

  function showBanner(type, message) {
    banner.textContent = message
    banner.className   = `notification ${type}`
  }

  function hideBanner() {
    banner.className = 'notification'
    banner.textContent = ''
  }

  // ── Validation ───────────────────────────────────────────────────────────

  function validate() {
    let ok = true

    // Full Name
    const name = document.getElementById('full_name').value.trim()
    if (!name) {
      showFieldError('full_name', 'Full name is required.')
      ok = false
    } else if (name.length < 2) {
      showFieldError('full_name', 'Full name must be at least 2 characters.')
      ok = false
    } else {
      clearFieldError('full_name')
    }

    // Email
    const email = document.getElementById('email').value.trim()
    if (!email) {
      showFieldError('email', 'Email address is required.')
      ok = false
    } else if (!EMAIL_RE.test(email)) {
      showFieldError('email', 'Please enter a valid email address (e.g. jane@company.com).')
      ok = false
    } else {
      clearFieldError('email')
    }

    // Experience Level
    if (!document.getElementById('experience_level').value) {
      showFieldError('experience_level', 'Please select your experience level.')
      ok = false
    } else {
      clearFieldError('experience_level')
    }

    // Tech Stack
    if (!document.getElementById('tech_stack').value) {
      showFieldError('tech_stack', 'Please select your primary technology stack.')
      ok = false
    } else {
      clearFieldError('tech_stack')
    }

    // Projects — at least one must be selected
    const selected = Array.from(document.getElementById('projects').selectedOptions)
    if (selected.length === 0) {
      showFieldError('projects', 'Please select at least one project.')
      ok = false
    } else {
      clearFieldError('projects')
    }

    // Preferred Duration
    if (!document.querySelector('input[name="preferred_duration"]:checked')) {
      showFieldError('preferred_duration', 'Please select a preferred project duration.')
      ok = false
    } else {
      clearFieldError('preferred_duration')
    }

    // Availability Confirmation
    if (!document.getElementById('availability_confirmed').checked) {
      showFieldError('availability_confirmed', 'Please confirm your availability before saving.')
      ok = false
    } else {
      clearFieldError('availability_confirmed')
    }

    return ok
  }

  // ── Submit ────────────────────────────────────────────────────────────────

  form.addEventListener('submit', function (e) {
    e.preventDefault()
    hideBanner()

    if (!validate()) {
      showBanner('error', 'Please fix the errors below before saving.')
      document.querySelector('.error-msg.visible')
        ?.scrollIntoView({ behavior: 'smooth', block: 'center' })
      return
    }

    // All client-side validation passed.
    // In the full application, collect FormData and POST to /api/employees/.
    showBanner('success', 'Profile saved successfully!')
  })

  // ── Live error clearing (clear error as soon as the user fixes a field) ──

  document.getElementById('full_name').addEventListener('input', () => clearFieldError('full_name'))

  document.getElementById('email').addEventListener('input', () => clearFieldError('email'))
  document.getElementById('email').addEventListener('blur', function () {
    const val = this.value.trim()
    if (!val) { showFieldError('email', 'Email address is required.'); return }
    if (!EMAIL_RE.test(val)) {
      showFieldError('email', 'Please enter a valid email address (e.g. jane@company.com).')
    } else {
      clearFieldError('email')
    }
  })

  document.getElementById('experience_level').addEventListener('change', () => clearFieldError('experience_level'))
  document.getElementById('tech_stack').addEventListener('change', () => clearFieldError('tech_stack'))
  document.getElementById('projects').addEventListener('change', () => clearFieldError('projects'))

  document.querySelectorAll('input[name="preferred_duration"]').forEach((r) =>
    r.addEventListener('change', () => clearFieldError('preferred_duration'))
  )

  document.getElementById('availability_confirmed').addEventListener('change', () =>
    clearFieldError('availability_confirmed')
  )

  // ── Clear Form ────────────────────────────────────────────────────────────

  function clearForm() {
    form.reset()
    hideBanner()
    document.querySelectorAll('.error-msg').forEach((el) => el.classList.remove('visible'))
    document.querySelectorAll('.invalid').forEach((el) => el.classList.remove('invalid'))
  }
</script>

</body>
</html>
